name: Build LiveDash APK

on:
  push:
    branches: [ "main", "dev", "release/**" ]
    paths-ignore: [ '**.md' ]
  pull_request:
    branches: [ "main" ]
    paths-ignore: [ '**.md' ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build LiveDash APK (arm64 + arm32)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Restore or generate keystore
        run: |
          mkdir -p signing
          if [ -f signing/signing-key.jks ] && [ "$(wc -c < signing/signing-key.jks)" -gt 100 ]; then
            echo "Using committed keystore: $(wc -c < signing/signing-key.jks) bytes"
          elif [ -n "${{ secrets.SIGNING_KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 -d > signing/signing-key.jks
            echo "Restored keystore from secret"
          else
            echo "Generating fresh keystore..."
            keytool -genkeypair \
              -alias LiveDash -keypass 123456 \
              -keystore signing/signing-key.jks \
              -storepass 123456 \
              -dname "CN=LiveDash,OU=Dev,O=RohanDora,L=India,S=India,C=IN" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storetype PKCS12 -noprompt
          fi

      - name: Create local.properties
        run: |
          printf 'signing.storeFile=signing/signing-key.jks\nsigning.storePassword=123456\nsigning.keyAlias=LiveDash\nsigning.keyPassword=123456\n' \
            > local.properties

      - name: chmod gradlew
        run: chmod +x ./gradlew

      - name: Bump version
        run: |
          BUILD=${{ github.run_number }}
          VER="1.0.${BUILD}"
          sed -i "s/versionCode = [0-9]*/versionCode = ${BUILD}/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${VER}\"/" app/build.gradle.kts
          echo "versionCode=${BUILD}  versionName=${VER}"

      - name: Assemble Release APKs
        run: |
          set -o pipefail
          ./gradlew :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Get version
        id: ver
        run: |
          VER=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[^"]+"' | tr -d '"' | head -1)
          echo "name=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Rename APKs
        run: |
          OUT="app/build/outputs/apk/release"
          ls "$OUT"
          ARM64=$(find "$OUT" -name "*arm64*release*.apk" | head -1)
          [ -n "$ARM64" ] && cp "$ARM64" "$OUT/LiveDash-v${{ steps.ver.outputs.name }}-arm64.apk"
          ARM32=$(find "$OUT" \( -name "*v7a*release*.apk" -o -name "*armeabi*release*.apk" \) | head -1)
          [ -n "$ARM32" ] && cp "$ARM32" "$OUT/LiveDash-v${{ steps.ver.outputs.name }}-arm32.apk"
          echo "=== Output APKs ==="
          ls -lh "$OUT"/*.apk

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveDash-v${{ steps.ver.outputs.name }}-arm64
          path: app/build/outputs/apk/release/LiveDash-*-arm64.apk
          retention-days: 30

      - name: Upload arm32 APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveDash-v${{ steps.ver.outputs.name }}-arm32
          path: app/build/outputs/apk/release/LiveDash-*-arm32.apk
          retention-days: 30

      - name: Create GitHub Release
        if: >
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.name }}-build.${{ github.run_number }}
          name: "LiveDash v${{ steps.ver.outputs.name }} (Build #${{ github.run_number }})"
          body: |
            **LiveDash v${{ steps.ver.outputs.name }} — Offline Android Communication App**

            Branch: `${{ github.ref_name }}` | Build: #${{ github.run_number }}
            Package: `com.rohan.livedash` | Developer: Rohan Dora

            ## Features
            - QR-based local pairing (no internet)
            - Real-time chat with reply support
            - Screenshot capture and transfer
            - Draggable overlay with chat, screenshot, disconnect buttons
            - Auto-reconnect on network recovery
            - Foreground service persistence

            ## Install
            | APK | Device |
            |-----|--------|
            | `LiveDash-v${{ steps.ver.outputs.name }}-arm64.apk` | Most modern phones (64-bit ARM) |
            | `LiveDash-v${{ steps.ver.outputs.name }}-arm32.apk` | Older 32-bit phones |

            Enable "Install from unknown sources" before installing.
          draft: false
          prerelease: true
          files: |
            app/build/outputs/apk/release/LiveDash-*-arm64.apk
            app/build/outputs/apk/release/LiveDash-*-arm32.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-log
          path: build.log
          retention-days: 7
